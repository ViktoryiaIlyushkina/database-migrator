name: hybrid-app-group

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: my_database
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d my_database"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Этап 1: Генерация SQL-скрипта из моделей EF Core
  ef_gen_script:
    build:
      context: ..
      dockerfile: HybridMigrator/TestMigrator.HybridEfCoreMigrator/Dockerfile
    volumes:
      - migration_scripts:/scripts
    depends_on:
      db:
        condition: service_healthy

  # Этап 2: Применение схем (миграций) к базе
  db_apply_migrations:
    image: postgres:16-alpine
    volumes:
      - migration_scripts:/scripts
    environment:
      PGPASSWORD: password
    depends_on:
      ef_gen_script:
        condition: service_completed_successfully
    entrypoint: >
      sh -c "psql -h db -U user -d my_database -f /scripts/init.sql"

  # Этап 2.5: Заполнение данными (Seed)
  db_seed_data:
    image: postgres:16-alpine
    volumes:
      # Пробрасываем оба файла из вашей папки sql-scripts на хосте
      - ./sql-scripts/01_seed_data.sql:/scripts/01_seed_data.sql
      - ./sql-scripts/02_seed_companies.sql:/scripts/02_seed_companies.sql
      - ./sql-scripts/03_seed_employees.sql:/scripts/03_seed_employees.sql
      - ./sql-scripts/04_seed_test.sql:/scripts/04_seed_test.sql
    environment:
      PGPASSWORD: password
    depends_on:
      db_apply_migrations:
        condition: service_completed_successfully
    # Используем оператор &&, чтобы второй скрипт запустился только при успехе первого
    entrypoint: >
      sh -c "psql -h db -U user -d my_database -f /scripts/01_seed_data.sql && 
             psql -h db -U user -d my_database -f /scripts/02_seed_companies.sql &&
             psql -h db -U user -d my_database -f /scripts/03_seed_employees.sql &&
             psql -h db -U user -d my_database -f /scripts/04_seed_test.sql"

  # Этап 3: Запуск основного API на Dapper
  api:
    build:
      context: ..
      dockerfile: HybridMigrator/TestMigrator.DapperHybridMigrator/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=my_database;Username=user;Password=password"
    depends_on:
      db_seed_data:
        condition: service_completed_successfully
    ports:
      - "8082:8080"

volumes:
  migration_scripts: